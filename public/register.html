<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>הרשמה | מערכת איתור נזילות</title><link rel="stylesheet" href="shared.css"><style>body{display:flex;align-items:center;justify-content:center;padding:24px}.auth-card{width:480px;max-width:100%;background:var(--c-surface);border:2px solid var(--c-border);border-radius:24px;padding:34px;box-shadow:var(--shadow)}.err{display:none;padding:12px 14px;border-radius:12px;border:2px solid rgba(255,77,77,.35);background:rgba(255,77,77,.12);color:#ffd4d4;margin-bottom:14px}.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.termsline{font-size:13px;color:var(--c-text3);line-height:1.7;margin-top:12px}.success{display:none;padding:18px;border-radius:14px;background:rgba(82,232,122,.12);border:2px solid rgba(82,232,122,.35);color:#c6ffd7;text-align:center}@media(max-width:700px){.row-2{grid-template-columns:1fr}}</style></head>
<body><div class="auth-card"><div class="brand" style="justify-content:center;margin-bottom:10px"><div class="brand-icon">🔍</div><div><div class="brand-name">אמיר — מאתר נזקי צנרת</div><div class="brand-sub">מערכת דיווח וניהול דוחות</div></div></div><div style="text-align:center;color:var(--c-text3);margin-bottom:20px">פתיחת חשבון למערכת הארכיטקטורה החדשה</div><div id="err" class="err"></div><div id="success" class="success">החשבון נוצר. מועבר לדשבורד…</div><div class="row-2"><div class="form-group"><label>שם פרטי</label><input id="firstName"></div><div class="form-group"><label>שם משפחה</label><input id="lastName"></div></div><div class="form-group"><label>אימייל</label><input id="email" type="email"></div><div class="form-group"><label>סיסמה</label><input id="password" type="password"></div><div class="form-group"><label>שם עסק</label><input id="company"></div><div style="margin-top:16px"><label style="display:flex;gap:8px;align-items:flex-start;font-size:14px;line-height:1.6;text-transform:none"><input type="checkbox" id="acceptLegal" style="width:auto;min-height:auto;margin-top:4px"><span>אני מאשר/ת שקראתי ואני מסכים/ה ל־<a href="legal/terms-of-service/terms-he.html" target="_blank">תנאי השימוש</a>, <a href="legal/privacy-policy/privacy-he.html" target="_blank">מדיניות הפרטיות</a> ו־<a href="legal/refund-policy/refunds-he.html" target="_blank">מדיניות ההחזרים</a>.</span></label></div><button class="btn btn-primary" style="width:100%;margin-top:18px" id="registerBtn">צור חשבון</button><div class="termsline">המערכת בנויה בסגנון OMDAN עם שכבות דשבורד, לקוחות, Billing ו־Legal.</div>
<div class="footer-legal">
  <a href="legal/index.html">מסמכים משפטיים</a>
  <a href="legal/terms-of-service/terms-he.html">תנאי שימוש</a>
  <a href="legal/privacy-policy/privacy-he.html">מדיניות פרטיות</a>
  <a href="legal/refund-policy/refunds-he.html">החזרים וביטול מנוי</a>
  <a href="legal/professional-disclaimer/disclaimer-he.html">הבהרה מקצועית</a>
</div>
</div><script src="shared.js"></script><script>document.getElementById('registerBtn').addEventListener('click',()=>{const err=document.getElementById('err');err.style.display='none';function fail(msg){err.textContent=msg;err.style.display='block';return;}const firstName=document.getElementById('firstName').value.trim();const lastName=document.getElementById('lastName').value.trim();const email=document.getElementById('email').value.trim().toLowerCase();const password=document.getElementById('password').value;if(!firstName||!lastName||!email||!password) return fail('נא למלא את כל השדות');if(!document.getElementById('acceptLegal').checked) return fail('יש לאשר את תנאי השימוש והמדיניות לפני הרשמה.');const users=getUsers();if(users.some(u=>u.email===email)) return fail('האימייל כבר קיים במערכת המקומית.');const user={id:uid('usr'),firstName,lastName,email,password,role:'owner',createdAt:nowISO()};users.push(user);saveUsers(users);saveSession({userId:user.id,email:user.email,role:user.role,displayName:firstName+' '+lastName});logActivity('auth.register','נוצר משתמש חדש',{email});document.getElementById('success').style.display='block';setTimeout(()=>location.href='index.html',900);});</script></body></html>
