<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMDAN Leak | לקוחות</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;color:#111;font-weight:900;">OL</div>
      <div style="line-height:1.25">
        <div style="display:flex;align-items:center;gap:6px;"><span style="font-size:16px;font-weight:900;">OMDAN Leak</span><span class="logo-status-dot"></span></div>
        <div style="font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.04em;">ניהול לקוחות והיסטוריית דוחות</div>
      </div>
    </div>
    <div class="header-actions">
      <a href="index.html" class="btn btn-ghost btn-sm">📊 דשבורד</a>
      <a href="form.html" class="btn btn-primary btn-sm">+ דוח חדש</a>
    </div>
  </div>
</header>

<main>
  <div class="page-title-wrap">
    <h1 class="page-title">ניהול <span>לקוחות</span></h1>
    <p class="page-subtitle">רשומות הלקוחות, היסטוריית הדוחות שלהם ופעולות מהירות ליצירת דוח חדש.</p>
  </div>

  <div class="stats-grid" style="margin-bottom:24px">
    <div class="stat-card gold"><span class="stat-icon">👥</span><div class="stat-value" id="customersCount">0</div><div class="stat-label">לקוחות</div><div class="stat-meta">רשומות שמורות</div></div>
    <div class="stat-card blue"><span class="stat-icon">🧾</span><div class="stat-value" id="reportsCount">0</div><div class="stat-label">דוחות</div><div class="stat-meta">שויכו ללקוחות</div></div>
    <div class="stat-card red"><span class="stat-icon">📍</span><div class="stat-value" id="citiesCount">0</div><div class="stat-label">ערים</div><div class="stat-meta">כיסוי לקוחות</div></div>
    <div class="stat-card green"><span class="stat-icon">⭐</span><div class="stat-value" id="activeCount">0</div><div class="stat-label">פעילים</div><div class="stat-meta">לקוחות עם לפחות דוח אחד</div></div>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <div class="table-title">👤 לקוחות שמורים</div>
      <div class="filter-bar">
        <div class="search-box"><span class="search-icon">🔍</span><input id="searchInput" placeholder="חיפוש לקוח / טלפון / עיר"></div>
        <button class="btn btn-primary btn-sm" id="newCustomerBtn">+ לקוח חדש</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>שם לקוח</th><th>טלפון</th><th>עיר</th><th>דוחות</th><th>פעולות</th></tr></thead>
        <tbody id="customersBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="shared.js"></script>
<script>
const CUSTOMERS_KEY='omdanLeakCustomers', REPORTS_KEY='omdanLeakReports';
const loadCustomers=()=>window.getCustomers?getCustomers():JSON.parse(localStorage.getItem(CUSTOMERS_KEY)||'[]');
const saveCustomers=rows=>window.saveCustomers?saveCustomers(rows):localStorage.setItem(CUSTOMERS_KEY, JSON.stringify(rows));
const loadReports=()=>window.getReports?getReports():JSON.parse(localStorage.getItem(REPORTS_KEY)||'[]');
const escapeHtml=s=>String(s??'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
let customers=loadCustomers(), reports=loadReports();

function renderStats(){
  document.getElementById('customersCount').textContent = customers.length;
  document.getElementById('reportsCount').textContent = reports.length;
  document.getElementById('citiesCount').textContent = new Set(customers.map(c=>c.city).filter(Boolean)).size;
  document.getElementById('activeCount').textContent = customers.filter(c=>reports.some(r=>(r.clientId&&r.clientId===c.id)||r.clientName===c.clientName)).length;
}
function renderTable(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const rows=customers.filter(c=>{
    const hay=`${c.clientName||''} ${c.phone||''} ${c.city||''}`.toLowerCase();
    return !q || hay.includes(q);
  });
  const body=document.getElementById('customersBody');
  if(!rows.length){
    body.innerHTML = `<tr><td colspan="5"><div class="empty-state" style="margin:14px">אין לקוחות להצגה.</div></td></tr>`;
    return;
  }
  body.innerHTML = rows.map(c=>{
    const cnt=reports.filter(r=>(r.clientId&&r.clientId===c.id)||r.clientName===c.clientName).length;
    return `<tr>
      <td><strong>${escapeHtml(c.clientName||'')}</strong></td>
      <td>${escapeHtml(c.phone||'—')}</td>
      <td>${escapeHtml(c.city||'—')}</td>
      <td>${cnt}</td>
      <td><div class="action-row">
        <a href="form.html?client=${encodeURIComponent(c.id||'')}" class="btn btn-primary btn-sm">דוח חדש</a>
        <button class="btn btn-ghost btn-sm" onclick="editCustomer('${c.id||''}')">עריכה</button>
      </div></td>
    </tr>`;
  }).join('');
}
function editCustomer(id){
  const c=customers.find(x=>String(x.id)===String(id)); if(!c) return;
  const clientName=prompt('שם לקוח', c.clientName||''); if(clientName===null) return;
  c.clientName=clientName;
  c.phone=prompt('טלפון', c.phone||'') ?? c.phone;
  c.city=prompt('עיר', c.city||'') ?? c.city;
  saveCustomers(customers); renderStats(); renderTable();
}
document.getElementById('newCustomerBtn').addEventListener('click',()=>{
  const clientName=prompt('שם לקוח חדש'); if(!clientName) return;
  customers.unshift({id:(crypto.randomUUID?crypto.randomUUID():String(Date.now())), clientName, phone:'', city:''});
  saveCustomers(customers); renderStats(); renderTable();
});
document.getElementById('searchInput').addEventListener('input', renderTable);
renderStats(); renderTable();
</script>
</body>
</html>
