<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OMDA | תשלום התקבל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#030712;color:#f9fafb;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:20px;}
.card{background:#111827;border-radius:24px;padding:52px 40px;max-width:480px;width:100%;text-align:center;}
.card.success{border:1px solid rgba(16,185,129,.3);}
.card.pending{border:1px solid rgba(245,158,11,.3);}
.card.error{border:1px solid rgba(239,68,68,.3);}
.icon{font-size:64px;margin-bottom:20px;}
h1{font-size:28px;font-weight:900;margin-bottom:10px;}
.sub{font-size:15px;color:#9ca3af;margin-bottom:28px;line-height:1.7;}
.plan-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;font-size:13px;font-weight:700;padding:8px 20px;border-radius:20px;margin-bottom:28px;}
.btn{display:inline-block;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;font-weight:800;font-size:15px;padding:14px 36px;border-radius:12px;text-decoration:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif;}
.btn-ghost{background:transparent;border:1px solid #374151;color:#9ca3af;margin-top:12px;font-size:13px;padding:10px 24px;display:inline-block;text-decoration:none;border-radius:12px;}
.loader{width:40px;height:40px;border:3px solid rgba(16,185,129,.15);border-top-color:#10b981;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.1)}100%{transform:scale(1)}}
.pop{animation:pop .5s ease;}
.note{margin-top:18px;font-size:12px;color:#6b7280;line-height:1.7;}
.small{font-size:12px;color:#6b7280;line-height:1.7;margin-top:14px;word-break:break-word;}
</style>

<style>
@media(max-width:768px){
  nav{padding:10px 4% !important;flex-wrap:nowrap;}
  .nav-links{display:none;}
  .hero h1,.hero-title{font-size:28px !important;}
  .pricing-grid{grid-template-columns:1fr !important;}
  .pricing-section{padding:0 16px !important;}
  .plan-card.popular{order:-1;}
  .faq-section{padding:0 16px !important;}
}
@media(max-width:480px){
  body{font-size:13px;}
  h1{font-size:24px !important;}
  .card{padding:24px 16px !important;}
  .btn{font-size:13px !important;}
}
</style>
<link rel="icon" type="image/png" href="/assets/img/omdan-leak-icon.png">

<body>

<div style="text-align:center;margin-bottom:24px;">
      <a href="/" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;">
        <img src="/assets/img/omdan-leak-icon.png" alt="" style="height:34px;width:34px;object-fit:contain;"> </div>
      </a>
    </div>
    <div class="card pending" id="card">
  <div class="loader"></div>
  <h1>מאמת תשלום...</h1>
  <p class="sub">מקבל אישור מהמערכת.<br>הדף יתעדכן אוטומטית.</p>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey: 'AIzaSyBZlf3YfVAYQ2f2MFrlDiGOD6mRaJcHAtg',
  authDomain: 'omdan-leak.firebaseapp.com',
  projectId: 'omdan-leak'
});

const auth = getAuth(app);
const db = getFirestore(app);

const planNames = {
  starter: 'Starter',
  pro: 'Pro',
  office: 'Office'
};

const billingLabels = {
  monthly: 'חודשי',
  annual: 'שנתי'
};

const params = new URLSearchParams(location.search);
const sessionId = params.get('session');

const card = document.getElementById('card');

function showPending(extra = '') {
  card.className = 'card pending';
  card.innerHTML = `
    <div class="loader"></div>
    <h1>מאמת תשלום...</h1>
    <p class="sub">מקבל אישור מהמערכת.<br>הדף יתעדכן אוטומטית.</p>
    ${extra ? `<div class="small">${extra}</div>` : ''}
  `;
}

function showSuccess(planId, billingMode) {
  card.className = 'card success';
  card.innerHTML = `
    <div class="icon pop">🎉</div>
    <h1>ברוך הבא ל-OMDA!</h1>
    <p class="sub">התשלום התקבל בהצלחה.<br>החשבון שלך מוכן לשימוש מלא.</p>
    <div class="plan-badge">✓ מסלול ${planNames[planId] || planId || 'פעיל'} — ${billingLabels[billingMode] || billingMode || 'פעיל'}</div><br>
    <a href="/app/dashboard.html" class="btn">🚀 כניסה למערכת</a>
    <p class="note">חשבונית מס תישלח למייל שלך</p>
  `;
}

function showError(msg) {
  card.className = 'card error';
  card.innerHTML = `
    <div class="icon">⚠️</div>
    <h1>לא ניתן לאמת תשלום</h1>
    <p class="sub">${msg || 'אנא פנה לתמיכה או נסה שוב.'}</p>
    <a href="pricing.html" class="btn">נסה שוב</a><br>
    <a href="/app/dashboard.html" class="btn-ghost">חזרה למערכת</a>
    <div class="small">Session: ${sessionId || 'missing'}</div>
  `;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function waitForAuthInit(timeoutMs = 10000) {
  return new Promise((resolve) => {
    let done = false;

    const timer = setTimeout(() => {
      if (done) return;
      done = true;
      resolve(auth.currentUser || null);
    }, timeoutMs);

    onAuthStateChanged(auth, (user) => {
      if (done) return;
      done = true;
      clearTimeout(timer);
      resolve(user || null);
    }, () => {
      if (done) return;
      done = true;
      clearTimeout(timer);
      resolve(auth.currentUser || null);
    });
  });
}

async function verifySession() {
  if (!sessionId) {
    showError('קישור לא תקין — אין session ID.');
    return;
  }

  showPending(`Session: ${sessionId}`);

  await waitForAuthInit(10000);

  const maxAttempts = 45; // 90 שניות
  let lastStatus = null;
  let lastError = null;

  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try {
      const snap = await getDoc(doc(db, 'checkoutSessions', sessionId));

      if (snap.exists()) {
        const data = snap.data();
        lastStatus = data.status || null;

        if (data.status === 'paid') {
          showSuccess(data.planId, data.billingMode);
          return;
        }

        if (data.status === 'failed') {
          showError('התשלום נדחה או שנכשל באימות. לא בוצע חיוב פעיל.');
          return;
        }

        showPending(`אימות תשלום... ניסיון ${attempt} מתוך ${maxAttempts}`);
      } else {
        showPending(`הסשן עדיין לא זמין במערכת... ניסיון ${attempt} מתוך ${maxAttempts}`);
      }
    } catch (err) {
      lastError = err;
      showPending(`ממתין לאימות... ניסיון ${attempt} מתוך ${maxAttempts}`);
    }

    await sleep(2000);
  }

  console.error('Payment verification timeout', {
    sessionId,
    lastStatus,
    lastError
  });

  showError(
    'אימות התשלום לוקח יותר זמן מהרגיל.<br>אם שילמת, המנוי בדרך כלל יופעל תוך זמן קצר.<br>ניתן לחזור למערכת ולרענן בעוד דקה.'
  );
}

verifySession();
</script>
