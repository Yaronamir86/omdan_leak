<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ניהול דוחות</title>

<link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
<link rel="icon" type="image/png" href="/assets/img/omdan-leak-icon.png" />
<link rel="apple-touch-icon" href="/assets/img/omdan-leak-icon.png" />

<meta name="theme-color" content="#2196F3" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary: #111827;
        --primary2: #1f2937;
        --primary3: #374151;
        --accent: #2196f3;
        --accent3: #1565c0;
        --blue: #3b82f6;
        --red: #ef4444;
        --green: #10b981;
        --purple: #8b5cf6;
        --text: #f9fafb;
        --muted: #9ca3af;
        --subtle: #6b7280;
        --border: #1f2937;
        --card: #111827;
        --bg: #030712;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Heebo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 14px;
      }

      /* ── Layout ── */
      .app {
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 240px;
        flex-shrink: 0;
        background: var(--primary);
        border-left: 1px solid var(--border);
        padding: 24px 0;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        z-index: 150;
      }
      .main-wrap {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      /* ── Sidebar ── */
      .sb-logo {
        display: flex;
        align-items: center;
        padding: 0 20px 20px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }
      .sb-nav {
        flex: 1;
      }
      .sb-nav a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px;
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        text-decoration: none;
        transition: all 0.15s;
        border-right: 3px solid transparent;
        white-space: nowrap;
      }
      .sb-nav a:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }
      .sb-nav a.active {
        color: var(--accent);
        border-right-color: var(--accent);
        background: rgba(245, 158, 11, 0.06);
      }
      .sb-nav .nav-icon {
        font-size: 16px;
        width: 22px;
        text-align: center;
        flex-shrink: 0;
      }
      .sb-sep {
        height: 1px;
        background: var(--border);
        margin: 6px 20px;
      }
      .sb-footer {
        padding: 16px 20px;
        border-top: 1px solid var(--border);
        margin-top: auto;
      }
      .sb-user-name {
        font-size: 11px;
        color: var(--subtle);
        margin-bottom: 8px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .btn-logout {
        width: 100%;
        padding: 9px;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 8px;
        color: #f87171;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        font-family: "Heebo", sans-serif;
        transition: background 0.2s;
      }
      .btn-logout:hover {
        background: rgba(239, 68, 68, 0.18);
      }

      /* ── Topbar ── */
      #topbar {
        background: var(--primary);
        border-bottom: 1px solid var(--border);
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .tb-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .tb-page {
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
      }

      /* ── Main ── */
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 20px;
        width: 100%;
      }
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .page-title {
        font-size: 20px;
        font-weight: 800;
      }
      .page-sub {
        font-size: 13px;
        color: var(--muted);
        margin-top: 2px;
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 20px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-family: "Heebo", sans-serif;
        font-size: 13px;
        font-weight: 700;
        transition: all 0.18s;
        text-decoration: none;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent3));
        color: #111;
        box-shadow: 0 3px 12px rgba(245, 158, 11, 0.3);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid var(--primary3);
        color: var(--muted);
      }
      .btn-ghost:hover {
        color: var(--text);
        border-color: var(--muted);
      }
      .btn-sm {
        padding: 6px 14px;
        font-size: 12px;
        border-radius: 10px;
      }

      /* ── Stats ── */
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
        margin-bottom: 20px;
      }
      .sc {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
      }
      .sc .label {
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
      }
      .sc .value {
        font-size: 26px;
        font-weight: 900;
        letter-spacing: -1px;
      }
      .sc-green {
        border-top: 3px solid var(--green);
      }
      .sc-blue {
        border-top: 3px solid var(--blue);
      }
      .sc-accent {
        border-top: 3px solid var(--accent);
      }
      .sc-purple {
        border-top: 3px solid var(--purple);
      }

      /* ── Toolbar ── */
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        gap: 12px;
        flex-wrap: wrap;
      }
      .toolbar-title {
        font-size: 16px;
        font-weight: 800;
      }
      .filters {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .search-wrap {
        position: relative;
      }
      .search-wrap input {
        background: var(--primary2);
        border: 1.5px solid var(--primary3);
        border-radius: 10px;
        padding: 9px 12px 9px 36px;
        font-size: 13px;
        font-family: "Heebo", sans-serif;
        color: var(--text);
        direction: rtl;
        outline: none;
        width: 260px;
        transition: border-color 0.2s;
      }
      .search-wrap input:focus {
        border-color: var(--accent);
      }
      .search-wrap .ico {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 15px;
        pointer-events: none;
      }
      .filter-select {
        background: var(--primary2);
        border: 1.5px solid var(--primary3);
        border-radius: 10px;
        padding: 9px 34px 9px 12px;
        font-size: 13px;
        font-family: "Heebo", sans-serif;
        color: var(--text);
        outline: none;
        min-width: 130px;
        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, var(--muted) 50%),
          linear-gradient(135deg, var(--muted) 50%, transparent 50%);
        background-position:
          calc(100% - 18px) calc(50% - 3px),
          calc(100% - 13px) calc(50% - 3px);
        background-size: 5px 5px;
        background-repeat: no-repeat;
      }
      .filter-select:focus {
        border-color: var(--accent);
      }

      /* ── Table ── */
      .table-wrap {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead {
        background: var(--primary2);
      }
      th {
        padding: 11px 16px;
        text-align: right;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.05em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      td {
        padding: 13px 16px;
        font-size: 13px;
        border-top: 1px solid var(--border);
        vertical-align: middle;
      }
      tr {
        position: relative;
      }
      tr:hover td {
        background: rgba(245, 158, 11, 0.04);
        cursor: pointer;
      }
      .row-actions {
        position: absolute;
        top: 50%;
        left: 12px;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        gap: 6px;
        transition: opacity 0.15s;
      }
      .row-menu-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        font-weight: 900;
        transition:
          background 0.15s,
          color 0.15s,
          opacity 0.15s;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        font-family: inherit;
      }
      @media (hover: hover) and (pointer: fine) {
        .row-actions {
          opacity: 0;
          visibility: hidden;
          pointer-events: none;
        }
        tr:hover .row-actions {
          opacity: 1;
          visibility: visible;
          pointer-events: auto;
        }
      }
      @media (hover: none), (pointer: coarse) {
        .row-actions {
          opacity: 1;
          visibility: visible;
          pointer-events: auto;
        }
      }
      .row-menu-btn:hover {
        background: var(--primary2);
        color: var(--text);
      }
      .row-dropdown {
        position: fixed;
        z-index: 500;
        min-width: 160px;
        background: #1f2937;
        border: 1px solid var(--primary3);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        padding: 6px;
        display: none;
      }
      .row-dropdown.open {
        display: block;
      }
      .row-dropdown-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        transition: background 0.12s;
        white-space: nowrap;
      }
      .row-dropdown-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      /* ── Badges ── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
      }
      .badge-done {
        background: rgba(16, 185, 129, 0.15);
        color: var(--green);
      }
      .mode-tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
      }
      .mode-direct {
        background: rgba(59, 130, 246, 0.12);
        color: var(--blue);
      }
      .mode-insurance {
        background: rgba(239, 68, 68, 0.12);
        color: var(--red);
      }
      .mode-contractor {
        background: rgba(16, 185, 129, 0.12);
        color: var(--green);
      }
      .mode-legal {
        background: rgba(139, 92, 246, 0.12);
        color: var(--purple);
      }

      /* ── Empty/Loading ── */
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }
      .empty .icon {
        font-size: 40px;
        margin-bottom: 10px;
      }
      .spin {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid var(--primary3);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        main {
          padding: 16px 12px 100px;
        }
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
        th:nth-child(3),
        td:nth-child(3),
        th:nth-child(5),
        td:nth-child(5) {
          display: none;
        }
        .search-wrap input {
          width: 100%;
        }
        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }
        .filters {
          width: 100%;
        }
      }
    </style>
  </head>

">

<script src="/app/config/firebase-config-global.js"></script>
    <script>
      firebase.initializeApp(window.FIREBASE_CONFIG);
      const auth = firebase.auth(),
        db = firebase.firestore();
      let allReports = [],
        currentUser = null;

      function isCaseDone(c) {
        return c.status === "completed" || !!(c.cause && c.recommendation);
      }

      let authChecked = false;


      function hidePageLoader() {
        const loader = document.getElementById('pageLoader');
        if (!loader) return;
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 400);
      }
      auth.onAuthStateChanged(async (u) => {
        if (authChecked) return;
        authChecked = true;

        if (!u) {
          setTimeout(() => {
            if (!firebase.auth().currentUser) {
              window.location.href =
                "/index.html?redirect=" +
                encodeURIComponent(location.pathname + location.search);
            }
          }, 300);
          return;
        }
        currentUser = u;

        const sb = document.getElementById("sidebarUser");
        if (sb) sb.textContent = u.displayName || u.email;
        loadReports();
        hidePageLoader();
      });

      async function loadReports() {
        try {
          const snap = await db
            .collection("leakCases")
            .where("uid", "==", currentUser.uid)
            .limit(200)
            .get();
          allReports = snap.docs
            .map((d) => ({ id: d.id, ...d.data() }))
            .filter(isCaseDone)
            .sort((a, b) => {
              const ta = a.updatedAt?.seconds || a.createdAt?.seconds || 0;
              const tb = b.updatedAt?.seconds || b.createdAt?.seconds || 0;
              return tb - ta;
            });
          renderStats(allReports);
          renderTable(allReports);
          document.getElementById("pageSubtitle").textContent =
            `${allReports.length} דוחות איתור`;
        } catch (e) {
          document.getElementById("reportsBody").innerHTML =
            `<tr><td colspan="6"><div class="empty"><div class="icon">⚠️</div><p>${e.message}</p></div></td></tr>`;
        }
      }

      function renderStats(r) {
        document.getElementById("statTotal").textContent = r.length;
        document.getElementById("statInsurance").textContent = r.filter(
          (c) => c.certainty === "גבוהה" || c.certainty === "ודאית",
        ).length;
        document.getElementById("statPrivate").textContent = r.filter(
          (c) => c.insCompany,
        ).length;
        document.getElementById("statTax").textContent = r.filter(
          (c) => c.status === "completed",
        ).length;
      }

      function renderTable(reports) {
        const tbody = document.getElementById("reportsBody");
        if (!reports.length) {
          tbody.innerHTML = `<tr><td colspan="6"><div class="empty">
      <div class="icon">📄</div>
      <p style="font-size:15px;font-weight:700;margin-bottom:8px;">אין דוחות איתור סגורים עדיין</p>
      <p>דוחות יופיעו כאן לאחר שתסגור קריאות</p>
    </div></td></tr>`;
          return;
        }
        tbody.innerHTML = reports
          .map((c) => {
            const name = c.customer || c.name || "";
            const claim = c.caseNumber || "";
            const title =
              [name, claim].filter(Boolean).join(" — ") || "ללא כותרת";
            const ev = c.cause
              ? c.cause.substring(0, 30) + (c.cause.length > 30 ? "..." : "")
              : "";
            const ts = c.updatedAt?.seconds || c.createdAt?.seconds;
            const date = ts
              ? new Date(ts * 1000).toLocaleDateString("he-IL")
              : "";
            const src = (
              c.source ||
              c.state?.client?.source ||
              ""
            ).toLowerCase();
            return `<tr onclick="openReport('${c.id}')">
      <td style="font-weight:800;color:var(--accent);font-size:12px;">${c.id?.replace("case_", "#")?.slice(-6) || ""}</td>
      <td style="font-weight:600;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(title)}</td>
      <td>${sourceTag(src)}</td>
      <td style="font-size:12px;">${ev}</td>
      <td style="color:var(--muted);font-size:12px;">${date}</td>
      <td style="position:relative;text-align:left;padding-left:8px;">
        <div class="row-actions">
          <button class="row-menu-btn" onclick="event.stopPropagation();openMenu(event,'${c.id}')">⋯</button>
        </div>
      </td>
    </tr>`;
          })
          .join("");
      }

      function filterReports() {
        const q = (document.getElementById("searchInput").value || "")
          .toLowerCase()
          .trim();
        const mode = (document.getElementById("modeFilter").value || "").trim();
        const filtered = allReports.filter((c) => {
          const name = (c.state?.base?.fullName || c.name || "").toLowerCase();
          const claim = (
            c.state?.client?.claimNum ||
            c.caseNum ||
            ""
          ).toLowerCase();
          const addr = (
            c.state?.client?.address ||
            c.state?.client?.city ||
            ""
          ).toLowerCase();
          const matchText =
            !q || name.includes(q) || claim.includes(q) || addr.includes(q);
          const src = (c.source || c.state?.client?.source || "").toLowerCase();
          const matchMode = !mode || src === mode;
          return matchText && matchMode;
        });
        renderTable(filtered);
      }

      function sourceTag(s) {
        const map = {
          insurance: ["mode-insurance", "ביטוח"],
          direct: ["mode-direct", "פנייה ישירה"],
          contractor: ["mode-contractor", "קבלן/ועד"],
          legal: ["mode-legal", 'עו"ד/שמאי'],
        };
        const [cls, lbl] = map[s] || ["mode-direct", "ישיר"];
        return `<span class="mode-tag ${cls}">${lbl}</span>`;
      }

      let _activeMenu = null;
      function openMenu(e, caseId) {
        e.stopPropagation();
        const dd = document.getElementById("rowDropdown");
        if (_activeMenu === caseId && dd.classList.contains("open")) {
          closeMenu();
          return;
        }
        _activeMenu = caseId;
        dd.innerHTML = `
    <div class="row-dropdown-item" onclick="closeMenu();openReport('${caseId}')">📄 הצג דוח</div>
    <div class="row-dropdown-item" onclick="closeMenu();downloadPDF('${caseId}')">⬇️ הורד PDF</div>
    <div class="row-dropdown-item" onclick="closeMenu();goToPayment('${caseId}')">💰 תשלום לדוח זה</div>`;
        dd.classList.add("open");
        const r = e.currentTarget.getBoundingClientRect();
        let top = r.bottom + 6,
          left = r.left - 160 + r.width;
        if (top + 120 > window.innerHeight - 12) top = r.top - 120 - 6;
        if (left < 8) left = 8;
        dd.style.top = top + "px";
        dd.style.left = left + "px";
      }
      function closeMenu() {
        document.getElementById("rowDropdown").classList.remove("open");
        _activeMenu = null;
      }
      document.addEventListener("click", closeMenu);

      function openReport(id) {
        window.location.href = `/app/case.html?id=${id}&view=report`;
      }
      function downloadPDF(id) {
        window.open(`/app/case.html?id=${id}&view=report&print=1`, "_blank");
      }
      function goToPayment(id) {
        window.location.href = `/app/payments.html?case=${id}`;
      }
      function doLogout() {
        auth.signOut().then(() => (window.location.href = "/"));
      }
      function escHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
    </script>
  </body>
</html>
