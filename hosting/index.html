<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OMDA איתור | כניסה</title>
    <link rel="icon" type="image/png" href="/assets/img/omdan-leak-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/img/omdan-leak-icon.png" />
    <meta name="theme-color" content="#2196F3" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="OMDA איתור" />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #111827;
        --primary2: #1f2937;
        --primary3: #374151;
        --accent: #2196f3;
        --accent3: #1565c0;
        --text: #f9fafb;
        --muted: #9ca3af;
        --subtle: #6b7280;
        --border: #1f2937;
        --bg: #030712;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Heebo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
      }
      body::after {
        content: "";
        position: fixed;
        top: -20%;
        right: -10%;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(245, 158, 11, 0.07) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .wrap {
        width: 100%;
        max-width: 520px;
        padding: 24px;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.45s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .logo-row {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 36px;
        gap: 8px;
      }
      .tagline {
        font-size: 13px;
        color: var(--muted);
        margin-top: 8px;
      }
      .card {
        background: var(--primary);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 36px 40px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
      }
      .card h2 {
        font-size: 20px;
        font-weight: 800;
        margin-bottom: 4px;
      }
      .card > p {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 24px;
      }
      .field {
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        background: var(--primary2);
        border: 1.5px solid var(--primary3);
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 14px;
        font-family: "Heebo", sans-serif;
        color: var(--text);
        transition: border-color 0.2s;
        outline: none;
      }
      input:focus {
        border-color: var(--accent);
      }
      .btn {
        width: 100%;
        padding: 13px;
        border-radius: 10px;
        border: none;
        font-size: 14px;
        font-family: "Heebo", sans-serif;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent3));
        color: #111;
        box-shadow: 0 3px 12px rgba(245, 158, 11, 0.3);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 18px rgba(245, 158, 11, 0.4);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn-google {
        background: var(--primary2);
        color: var(--text);
        border: 1px solid var(--primary3);
      }
      .btn-google:hover {
        border-color: var(--muted);
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 18px 0;
        color: var(--subtle);
        font-size: 12px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .toggle-link {
        text-align: center;
        margin-top: 18px;
        font-size: 13px;
        color: var(--muted);
      }
      .toggle-link a {
        color: var(--accent);
        cursor: pointer;
        font-weight: 700;
        text-decoration: none;
      }
      .forgot {
        text-align: left;
        margin-top: -6px;
        margin-bottom: 14px;
      }
      .forgot a {
        font-size: 12px;
        color: var(--subtle);
        cursor: pointer;
        text-decoration: none;
      }
      .forgot a:hover {
        color: var(--accent);
      }
      .error-box {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        color: #fca5a5;
        margin-bottom: 14px;
        display: none;
      }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(0, 0, 0, 0.2);
        border-top-color: #111;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .omdan-footer {
        background: #0d1117;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
        padding: 20px 5%;
        text-align: center;
        font-size: 12px;
        color: #6b7280;
        margin-top: 40px;
        width: 100%;
      }
      .omdan-footer a {
        color: #9ca3af;
        text-decoration: none;
        margin: 0 6px;
        transition: color 0.2s;
      }
      .omdan-footer a:hover {
        color: #2196f3;
      }
      @media (max-width: 480px) {
        .wrap {
          padding: 16px;
        }
        .card {
          padding: 24px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo-row">
        <img
          src="/assets/img/omdan-leak-icon.png"
          alt=""
          style="height: 60px; width: 60px; object-fit: contain"
          onerror="this.src = '/assets/omda-icon.png'"
        />
        <img
          src="/assets/img/omdan-leak-logo.png"
          alt="OMDA איתור"
          style="
            height: 44px;
            object-fit: contain;
            filter: brightness(0) invert(1);
          "
          onerror="
            this.style.display = 'none';
            document.getElementById('logoText').style.display = 'block';
          "
        />
        <div
          id="logoText"
          style="
            display: none;
            font-size: 22px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 1px;
          "
        >
          OMDA איתור
        </div>
        <div class="tagline">מערכת ניהול תיקי איתור נזילות מקצועית</div>
      </div>
      <div class="card">
        <h2 id="fTitle">כניסה למערכת</h2>
        <p id="fSub">הזן את פרטיך כדי להמשיך</p>
        <div class="error-box" id="errBox"></div>

        <div id="loginForm">
          <div class="field">
            <label>אימייל</label
            ><input type="email" id="email" placeholder="you@example.com" />
          </div>
          <div class="field">
            <label>סיסמה</label
            ><input type="password" id="password" placeholder="••••••••" />
          </div>
          <div class="forgot"><a onclick="forgotPw()">שכחתי סיסמה</a></div>
          <button
            class="btn btn-primary"
            id="loginBtn"
            onclick="loginEmail()"
            data-lbl="כניסה"
          >
            כניסה
          </button>
          <div class="divider">או</div>
          <button class="btn btn-google" onclick="loginGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            כניסה עם Google
          </button>
          <div class="toggle-link">
            אין לך חשבון? <a href="/register.html">הרשמה</a>
          </div>
        </div>
      </div>
      <div
        style="
          text-align: center;
          margin-top: 20px;
          font-size: 12px;
          color: var(--subtle);
        "
      >
        <a
          href="/legal/terms-of-service/terms-he.html"
          style="color: var(--subtle); text-decoration: none; margin: 0 6px"
          >תנאי שימוש</a
        >
        ·
        <a
          href="/legal/privacy-policy/privacy-he.html"
          style="color: var(--subtle); text-decoration: none; margin: 0 6px"
          >פרטיות</a
        >
        ·
        <a
          href="/legal/refund-policy/refunds-he.html"
          style="color: var(--subtle); text-decoration: none; margin: 0 6px"
          >ביטולים</a
        >
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
      // *** REPLACE WITH YOUR ACTUAL omda-itur FIREBASE CONFIG ***
      firebase.initializeApp({
        apiKey: "AIzaSyAo5atj2i8RgevguKGR662-IQnjl1R45yI",
        authDomain: "omdan-leak.firebaseapp.com",
        projectId: "omdan-leak",
        storageBucket: "omdan-leak.firebasestorage.app",
        messagingSenderId: "979018499185",
        appId: "1:979018499185:web:1496303b1cd8a993bdc7d0",
        measurementId: "G-P62VFXD521",
      });
      const auth = firebase.auth(),
        db = firebase.firestore();
      auth.onAuthStateChanged((u) => {
        if (!u) return;

        const params = new URLSearchParams(window.location.search);
        const redirect = params.get("redirect");

        if (redirect) {
          window.location.href = redirect;
        } else {
          window.location.href = "/app/dashboard.html";
        }
      });

      function showErr(m) {
        const e = document.getElementById("errBox");
        e.textContent = m;
        e.style.display = "block";
      }
      function clearErr() {
        document.getElementById("errBox").style.display = "none";
      }
      function setLoad(id, on) {
        const b = document.getElementById(id);
        b.disabled = on;
        b.innerHTML = on ? '<div class="spinner"></div>' : b.dataset.lbl;
      }

      async function loginEmail() {
        const e = document.getElementById("email").value.trim(),
          p = document.getElementById("password").value;
        if (!e || !p) {
          showErr("יש למלא אימייל וסיסמה");
          return;
        }
        clearErr();
        setLoad("loginBtn", true);
        try {
          await auth.signInWithEmailAndPassword(e, p);
        } catch (err) {
          showErr(hErr(err.code));
          setLoad("loginBtn", false);
        }
      }
      async function loginGoogle() {
        clearErr();
        try {
          const c = await auth.signInWithPopup(
            new firebase.auth.GoogleAuthProvider(),
          );
          await db.collection("users").doc(c.user.uid).set(
            {
              displayName: c.user.displayName,
              email: c.user.email,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            },
            { merge: true },
          );
        } catch (err) {
          showErr(hErr(err.code));
        }
      }
      async function forgotPw() {
        const e = document.getElementById("email").value.trim();
        if (!e) {
          showErr("הזן אימייל תחילה");
          return;
        }
        try {
          await auth.sendPasswordResetEmail(e);
          showErr("📧 קישור לאיפוס נשלח לאימייל");
        } catch (err) {
          showErr(hErr(err.code));
        }
      }
      function hErr(code) {
        return (
          {
            "auth/user-not-found": "משתמש לא נמצא",
            "auth/wrong-password": "סיסמה שגויה",
            "auth/invalid-credential": "פרטים שגויים",
            "auth/email-already-in-use": "האימייל כבר רשום",
            "auth/invalid-email": "אימייל לא תקין",
            "auth/weak-password": "סיסמה חלשה מדי",
            "auth/popup-closed-by-user": "החלון נסגר",
            "auth/too-many-requests": "יותר מדי ניסיונות",
          }[code] || "שגיאה: " + code
        );
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loginEmail();
      });
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((r) => r.unregister());
        });
      }
    </script>
    <footer class="omdan-footer">
      <a href="/legal/terms-of-service/terms-he.html">תנאי שימוש</a> |
      <a href="/legal/privacy-policy/privacy-he.html">פרטיות</a> |
      <a href="/legal/refund-policy/refunds-he.html">החזרים</a> |
      <a href="/legal/subscription-terms/subscription-he.html">תנאי מנוי</a> |
      <a href="/legal/index.html">מסמכים משפטיים</a>
      <br /><span style="margin-top: 6px; display: block"
        >© 2026 OMDA. כל הזכויות שמורות.</span
      >
    </footer>
  </body>
</html>
