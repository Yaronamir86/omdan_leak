<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OMDA | שגיאת תשלום</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#030712;color:#f9fafb;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:20px;}
.card{background:#111827;border:1px solid rgba(239,68,68,.3);border-radius:24px;padding:52px 40px;max-width:480px;width:100%;text-align:center;}
.icon{font-size:64px;margin-bottom:20px;}
h1{font-size:28px;font-weight:900;margin-bottom:10px;}
.sub{font-size:15px;color:#9ca3af;margin-bottom:32px;line-height:1.7;}
.btn{display:inline-block;padding:13px 30px;border-radius:12px;text-decoration:none;font-weight:800;font-size:14px;font-family:'Heebo',sans-serif;cursor:pointer;border:none;}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;}
.btn-ghost{background:transparent;border:1px solid #374151;color:#9ca3af;}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.note{margin-top:24px;font-size:12px;color:#6b7280;line-height:1.7;}
</style>

<style>
@media(max-width:768px){
  nav{padding:10px 4% !important;flex-wrap:nowrap;}
  .nav-links{display:none;}
  .hero h1,.hero-title{font-size:28px !important;}
  .pricing-grid{grid-template-columns:1fr !important;}
  .pricing-section{padding:0 16px !important;}
  .plan-card.popular{order:-1;}
  .faq-section{padding:0 16px !important;}
}
@media(max-width:480px){
  body{font-size:13px;}
  h1{font-size:24px !important;}
  .card{padding:24px 16px !important;}
  .btn{font-size:13px !important;}
}
</style>
<link rel="icon" type="image/png" href="/assets/img/omdan-leak-icon.png">
</head>
<body>

<div class="card">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:20px;">
    <img src="/assets/img/omdan-leak-icon.png" alt="" style="height:44px;width:44px;object-fit:contain;">
    <img src="/assets/img/omdan-leak-logo.png" alt="OMDA איתור" style="height:28px;object-fit:contain;filter:brightness(0) invert(1);">
  </div>
  <div class="icon">❌</div>
  <h1>התשלום לא הושלם</h1>
  <p class="sub">התשלום נכשל או בוטל.<br>לא חויב כרטיס האשראי שלך.</p>
  <div class="actions">
    <a href="/pricing.html" class="btn btn-primary">נסה שוב</a>
    <a href="/app/dashboard.html" class="btn btn-ghost">חזרה למערכת</a>
  </div>
  <p class="note">
    אם נתקלת בבעיה טכנית — שלח מייל לתמיכה<br>
    או פנה ישירות דרך ממשק המערכת
  </p>
</div>

<style>
.omdan-footer{background:#0d1117;border-top:1px solid rgba(255,255,255,.07);padding:20px 5%;text-align:center;font-size:12px;color:#6b7280;margin-top:40px;}
.omdan-footer a{color:#9ca3af;text-decoration:none;margin:0 6px;transition:color .2s;}
.omdan-footer a:hover{color:#f59e0b;}
</style>

  <a href="/legal/index.html">מסמכים משפטיים</a>
  <br><span style="margin-top:6px;display:block;">© 2026 OMDA. כל הזכויות שמורות.</span>
</footer>
</body>
</html>
